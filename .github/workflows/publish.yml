name: Compile and Publish Notes

on:
  push:
    paths:
      - 'latex/**/*.tex'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout notes repo
        uses: actions/checkout@v4

      - name: Cache LaTeX install
        id: latex-cache
        uses: actions/cache@v4
        with:
          path: /usr/share/texlive
          key: texlive-full-v2

      - name: Install dependencies
        if: steps.latex-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science

      - name: Add LaTeX to PATH
        run: echo "/usr/share/texlive/bin/x86_64-linux" >> $GITHUB_PATH

      - name: Compile all .tex files to PDF
        run: |
          mkdir -p compiled_pdfs
          shopt -s globstar
          for f in latex/**/*.tex; do
            echo "Compiling $f..."
            pdflatex -interaction=nonstopmode -output-directory compiled_pdfs "$f" || true
          done

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: mayank-wangikar/mayank-wangikar.github.io
          token: ${{ secrets.WEBSITE_TOKEN }}
          path: website

      - name: Copy PDFs to website
        run: |
          mkdir -p website/pdfs
          cp compiled_pdfs/*.pdf website/pdfs/ 2>/dev/null || true

      - name: Update manifest
        run: |
          python3 - <<'EOF'
          import json, pathlib

          manifest_path = pathlib.Path("website/notes-manifest.json")
          
          if manifest_path.exists():
              state = json.loads(manifest_path.read_text())
          else:
              state = {"folders": [], "uncategorized": []}
          
          state.setdefault("folders", [])
          state.setdefault("uncategorized", [])

          def collect_names(folders):
              names = set()
              for f in folders:
                  for file in f.get("files", []):
                      names.add(file["name"])
                  names |= collect_names(f.get("subfolders", []))
              return names

          known = collect_names(state["folders"])
          known |= {f["name"] for f in state["uncategorized"]}

          for pdf in sorted(pathlib.Path("website/pdfs").glob("*.pdf")):
              if pdf.name not in known:
                  state["uncategorized"].append({
                      "name": pdf.name,
                      "title": pdf.stem.replace(" - ltx", "").replace(" - LTX", ""),
                      "path": f"pdfs/{pdf.name}"
                  })
                  print(f"Added: {pdf.name}")

          manifest_path.write_text(json.dumps(state, indent=2))
          EOF

      - name: Push to website
        run: |
          cd website
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pdfs/ notes-manifest.json
          git diff --staged --quiet || git commit -m "Update compiled PDFs"
          git pull --rebase
          git push
