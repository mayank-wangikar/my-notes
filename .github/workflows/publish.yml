name: Compile and Publish Notes

on:
  workflow_dispatch:
  push:
    paths:
      - 'latex/**/*.tex'
      
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout notes repo
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            texlive-pictures \
            texlive-plain-generic

      - name: Compile all .tex files to PDF
        run: |
          mkdir -p compiled_pdfs
          shopt -s globstar
          for f in latex/**/*.tex; do
            echo "Compiling $f..."
            pdflatex -interaction=nonstopmode -output-directory compiled_pdfs "$f" || true
          done

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: mayank-wangikar/mayank-wangikar.github.io
          token: ${{ secrets.WEBSITE_TOKEN }}
          path: website

      - name: Copy PDFs to website
        run: |
          mkdir -p website/pdfs
          cp compiled_pdfs/*.pdf website/pdfs/ 2>/dev/null || true

      - name: Update manifest
        run: |
          python3 - <<'EOF'
          import json, pathlib, re
          manifest_path = pathlib.Path("website/notes-manifest.json")
          if manifest_path.exists():
              state = json.loads(manifest_path.read_text())
          else:
              state = {"folders": [], "uncategorized": []}
          state.setdefault("folders", [])
          state.setdefault("uncategorized", [])
          def clean_title(stem):
              stem = re.sub(r'\s*-\s*ltx$', '', stem, flags=re.IGNORECASE)
              stem = re.sub(r'\s*-\s*LTX$', '', stem)
              return stem.strip()
          def collect_all(folders):
              entries = {}
              for f in folders:
                  for file in f.get("files", []):
                      entries[file["name"].lower()] = True
                      entries[clean_title(pathlib.Path(file["name"]).stem).lower()] = True
                  entries.update(collect_all(f.get("subfolders", [])))
              return entries
          known = collect_all(state["folders"])
          for f in state["uncategorized"]:
              known[f["name"].lower()] = True
              known[clean_title(pathlib.Path(f["name"]).stem).lower()] = True
          for pdf in sorted(pathlib.Path("website/pdfs").glob("*.pdf")):
              title = clean_title(pdf.stem)
              if pdf.name.lower() not in known and title.lower() not in known:
                  entry = {
                      "name": title,
                      "pdf": f"pdfs/{pdf.name}"
                  }
                  state["uncategorized"].append(entry)
                  known[pdf.name.lower()] = True
                  known[title.lower()] = True
                  print(f"Added: {title}")
          manifest_path.write_text(json.dumps(state, indent=2))
          print("Manifest updated.")
          EOF

      - name: Push to website
        run: |
          cd website
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pdfs/ notes-manifest.json
          git diff --staged --quiet || git commit -m "Update compiled PDFs"
          git pull --rebase
          git push
